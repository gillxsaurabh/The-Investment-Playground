name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Backend: lint + test
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check . --select E,F,W --ignore E501 --exclude venv,migrations

      - name: Run tests
        working-directory: backend
        env:
          JWT_SECRET: test-secret-for-ci-only-do-not-use-in-prod
          KITE_API_KEY: test_key
          KITE_API_SECRET: test_secret
        run: pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-omit="venv/*,migrations/*,test_*.py" --cov-fail-under=30

  # ─────────────────────────────────────────────────────────────
  # Frontend: build
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/cognicap-app/package-lock.json

      - name: Install dependencies
        working-directory: frontend/cognicap-app
        run: npm ci

      - name: Build (production)
        working-directory: frontend/cognicap-app
        run: npx ng build --configuration production

  # ─────────────────────────────────────────────────────────────
  # Docker: verify Dockerfile builds
  # ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify Dockerfile builds
        run: docker build --target=frontend-builder -t cognicap-test-build .

  # ─────────────────────────────────────────────────────────────
  # Secrets scanning
  # ─────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
