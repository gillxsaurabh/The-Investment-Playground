<div class="reset-container">
  <div class="bg-glow"></div>

  <div class="reset-card">
    <div class="header">
      <div class="brand-icon">
        <span class="material-icons">lock_reset</span>
      </div>
      <h1>The Investment Playground</h1>
      <p class="subtitle">Set New Password</p>
    </div>

    <div class="reset-content">

      <div class="form-group" *ngIf="!successMessage && token">
        <label for="newPassword">
          <span class="material-icons">lock</span>
          New Password
        </label>
        <input type="password" id="newPassword" [(ngModel)]="newPassword"
          placeholder="Minimum 8 characters" [disabled]="isLoading" autocomplete="new-password">
      </div>

      <div class="form-group" *ngIf="!successMessage && token">
        <label for="confirmPassword">
          <span class="material-icons">lock</span>
          Confirm Password
        </label>
        <input type="password" id="confirmPassword" [(ngModel)]="confirmPassword"
          placeholder="Confirm new password" [disabled]="isLoading"
          autocomplete="new-password" (keyup.enter)="resetPassword()">
      </div>

      <button class="btn btn-primary" *ngIf="!successMessage && token"
        (click)="resetPassword()" [disabled]="isLoading">
        <span class="material-icons" *ngIf="!isLoading">lock_reset</span>
        <span class="material-icons spin-icon" *ngIf="isLoading">refresh</span>
        {{ isLoading ? 'Resetting...' : 'Reset Password' }}
      </button>

      <div class="success-box" *ngIf="successMessage">
        <span class="material-icons">check_circle</span>
        <span>{{ successMessage }}</span>
      </div>

      <div class="error-box" *ngIf="error">
        <span class="material-icons">error_outline</span>
        <span>{{ error }}</span>
      </div>

      <div class="back-link">
        <a (click)="goToLogin()">
          <span class="material-icons" style="font-size:13px;vertical-align:middle;">arrow_back</span>
          Back to Sign In
        </a>
      </div>

    </div>
  </div>
</div>
