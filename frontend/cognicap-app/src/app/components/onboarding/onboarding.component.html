<div class="onboarding-wrap">
  <div class="onboarding-header">
    <div class="logo-row">
      <div class="logo-mark">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="16 7 22 7 22 13" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-text">TIP</span>
    </div>
    <h1>Choose your plan</h1>
    <p class="subtitle">Select how you'd like to use the platform. You can change this later in Account settings.</p>
  </div>

  <div class="tiers-row">
    <div
      class="tier-card"
      *ngFor="let tier of tiers"
      [class.selected]="selectedTier === tier.id"
      (click)="selectTier(tier.id)"
      [style.--accent]="tier.accent"
    >
      <div class="tier-badge" [style.background]="tier.accent">{{ tier.badge }}</div>
      <div class="tier-name">{{ tier.name }}</div>
      <div class="tier-tagline">{{ tier.tagline }}</div>
      <div class="tier-price">{{ tier.price }}</div>

      <ul class="feature-list">
        <li *ngFor="let f of tier.features" class="feature-yes">
          <span class="check">✓</span> {{ f }}
        </li>
        <li *ngFor="let m of tier.missing" class="feature-no">
          <span class="cross">✗</span> {{ m }}
        </li>
      </ul>

      <div class="select-indicator" *ngIf="selectedTier === tier.id">
        <span class="material-icons">check_circle</span> Selected
      </div>
    </div>
  </div>

  <div class="proceed-row">
    <button
      class="proceed-btn"
      [disabled]="!selectedTier || completing"
      (click)="proceed()"
    >
      <span *ngIf="!completing">Continue →</span>
      <span *ngIf="completing">Setting up...</span>
    </button>
    <p class="skip-note">Not sure yet? <a class="skip-link" (click)="selectedTier = 1; proceed()">Start with Stock Explorer</a></p>
  </div>
</div>
