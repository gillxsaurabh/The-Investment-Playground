<div class="chat-container" [class.minimized]="!isChatOpen">
  <div class="chat-header">
    <div class="header-info">
      <h3>AI Assistant</h3>
      <span class="status">Online</span>
    </div>
    <div class="header-actions">
      <button class="btn-icon" (click)="clearChat()" title="Clear chat">
        <span>↻</span>
      </button>
      <button class="btn-icon" (click)="toggleChat()" title="Toggle chat">
        <span>{{ isChatOpen ? '−' : '+' }}</span>
      </button>
    </div>
  </div>

  <div class="chat-body" *ngIf="isChatOpen">
    <div class="messages-container" #messagesContainer>
      <div 
        *ngFor="let message of messages" 
        class="message"
        [class.user-message]="message.isUser"
        [class.ai-message]="!message.isUser">
        <div class="message-content">
          <p>{{ message.text }}</p>
          <span class="message-time">{{ formatTime(message.timestamp) }}</span>
        </div>
      </div>
      
      <div class="message ai-message" *ngIf="isLoading">
        <div class="message-content">
          <div class="typing-indicator">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </div>

    <div class="chat-input">
      <input 
        type="text" 
        [(ngModel)]="newMessage"
        (keyup.enter)="sendMessage()"
        [disabled]="isLoading"
        placeholder="Ask me anything..."
        class="input-field">
      <button 
        class="btn-send" 
        (click)="sendMessage()"
        [disabled]="!newMessage.trim() || isLoading">
        <span>↑</span>
      </button>
    </div>
  </div>
</div>
