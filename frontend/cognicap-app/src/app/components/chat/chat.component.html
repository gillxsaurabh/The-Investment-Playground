<div class="chat-container" [class.minimized]="!isChatOpen">
  <div class="chat-header">
    <div class="header-info">
      <div class="ai-avatar">
        <svg class="cat-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="14" r="7.5"/>
          <path d="M6.5 9.5 L4 3.5 L10 7.5 Z"/>
          <path d="M17.5 9.5 L20 3.5 L14 7.5 Z"/>
          <circle cx="9.5" cy="13" r="1" fill="currentColor" stroke="none"/>
          <circle cx="14.5" cy="13" r="1" fill="currentColor" stroke="none"/>
          <path d="M12 15 L10.5 16.5 L13.5 16.5 Z" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <div class="header-text">
        <h3>Tipsy</h3>
        <span class="status">
          <span class="status-dot"></span>
          Online
        </span>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-icon" (click)="clearChat()" title="Clear chat">
        <span class="material-icons">restart_alt</span>
      </button>
      <button class="btn-icon btn-toggle" (click)="toggleChat()" title="Toggle chat">
        <span class="material-icons">{{ isChatOpen ? 'keyboard_arrow_down' : 'keyboard_arrow_up' }}</span>
      </button>
    </div>
  </div>

  <div class="chat-body" *ngIf="isChatOpen">
    <div class="messages-container" #messagesContainer>
      <div
        *ngFor="let message of messages"
        class="message"
        [class.user-message]="message.isUser"
        [class.ai-message]="!message.isUser">
        <div class="message-content">
          <p>{{ message.text }}</p>
          <span class="message-time">{{ formatTime(message.timestamp) }}</span>
        </div>
      </div>

      <div class="message ai-message" *ngIf="isLoading">
        <div class="message-content">
          <div class="typing-indicator">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </div>

    <div class="chat-input">
      <input
        type="text"
        [(ngModel)]="newMessage"
        (keyup.enter)="sendMessage()"
        [disabled]="isLoading"
        placeholder="Ask me anything about your portfolio..."
        class="input-field">
      <button
        class="btn-send"
        (click)="sendMessage()"
        [disabled]="!newMessage.trim() || isLoading">
        <span class="material-icons">send</span>
      </button>
    </div>
  </div>
</div>
