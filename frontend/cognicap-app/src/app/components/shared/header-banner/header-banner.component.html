<!-- Top Banner -->
<header class="tip-banner">
  <div class="banner-content">
    <div class="banner-left">
      <span class="platform-name">TIP</span>
      <span class="platform-tagline">The Investment Playground</span>
    </div>
    <div class="banner-right">
      <span class="user-name" *ngIf="userName">
        <span class="material-icons">person</span>
        {{ userName }}
      </span>
      <button class="logout-btn" (click)="logout()">
        <span class="material-icons">logout</span>
        Logout
      </button>
    </div>
  </div>
</header>

<!-- Navigation Bar -->
<nav class="tip-nav">
  <div class="nav-content">
    <button
      class="nav-btn"
      [class.active]="activePage === 'trading-agent'"
      (click)="navigateTo('trading-agent')">
      <span class="material-icons">show_chart</span>
      Trading Arena
    </button>
    <button
      class="nav-btn"
      [class.active]="activePage === 'dashboard'"
      (click)="navigateTo('dashboard')">
      <span class="material-icons">account_balance_wallet</span>
      Portfolio
    </button>
  </div>
</nav>

<!-- Live Market Ticker -->
<app-market-banner
  [nifty]="nifty"
  [sensex]="sensex"
  [marketGainers]="marketGainers"
  [marketLosers]="marketLosers"
  [isLoading]="isMarketLoading"
  [error]="marketError">
</app-market-banner>
