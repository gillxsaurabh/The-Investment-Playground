<!-- Sidebar (fixed left) -->
<app-sidebar
  [userName]="userName"
  [brokerLinked]="brokerLinked"
  (onLogout)="logout()">
</app-sidebar>

<!-- Slim top bar (fixed, offset by sidebar via CSS var) -->
<header class="top-bar">
  <div class="top-bar-left">
    <span class="platform-name">The Investment Playground</span>
    <span class="platform-tagline">Portfolio Intelligence</span>
  </div>
  <div class="top-bar-right">
    <div class="broker-chip" [class.linked]="brokerLinked"
         [title]="brokerLinked ? 'Kite linked — live data' : 'Demo mode'">
      <span class="broker-dot"></span>
      <span class="broker-text">{{ brokerLinked ? 'Live' : 'Demo' }}</span>
    </div>
    <span class="user-chip" *ngIf="userName" (click)="navigateTo('account')" title="Account settings">
      <span class="material-icons">person</span>
      {{ userName }}
    </span>
    <button class="logout-btn" (click)="logout()" title="Logout">
      <span class="material-icons">logout</span>
    </button>
  </div>
</header>

<!-- Market ticker (compact, fixed below top bar) -->
<div class="ticker-row">
  <app-market-banner
    [nifty]="nifty"
    [sensex]="sensex"
    [marketGainers]="marketGainers"
    [marketLosers]="marketLosers"
    [isLoading]="isMarketLoading"
    [error]="marketError">
  </app-market-banner>
</div>
